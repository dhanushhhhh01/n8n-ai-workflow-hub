version: "3.8"

  services:
  n8n:
    image: n8nio/n8n:latest
          container_name: n8n
                restart: unless-stopped
                      ports:
      - "5678:5678"
            environment:
      - N8N_BASIC_AUTH_ACTIVE=true
              - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
              - N8N_PROTOCOL=http
              - WEBHOOK_URL=http://${N8N_HOST:-localhost}:5678/
      - GENERIC_TIMEZONE=${TIMEZONE:-Europe/Berlin}
      - DB_TYPE=postgresdb
              - DB_POSTGRESDB_HOST=postgres
              - DB_POSTGRESDB_PORT=5432
              - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8npassword}
    volumes:
      - n8n_data:/home/node/.n8n
              - ./workflows:/workflows
                    depends_on:
      postgres:
        condition: service_healthy
              networks:
      - n8n_network

          postgres:
    image: postgres:15-alpine
          container_name: n8n_postgres
                restart: unless-stopped
                      environment:
      - POSTGRES_DB=${POSTGRES_DB:-n8n}
      - POSTGRES_USER=${POSTGRES_USER:-n8n}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-n8npassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
            healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n}"]
      interval: 10s
              timeout: 5s
                      retries: 5
                            networks:
      - n8n_network

          redis:
    image: redis:7-alpine
          container_name: n8n_redis
                restart: unless-stopped
                      networks:
      - n8n_network

        volumes:
  n8n_data:
  postgres_data:

networks:
  n8n_network:
    driver: bridge
